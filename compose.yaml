services:
    db:
        image: postgres:15-alpine
        restart: unless-stopped
        environment:
            POSTGRES_USER: ${DB_USER}
            POSTGRES_DB: ${DB_NAME}
            POSTGRES_PASSWORD: ${DB_PASS}
        volumes:
            - postgres_data:/var/lib/postgresql/data
        command:
            - "postgres"
            - "-c"
            - "max_connections=20"
            - "-c"
            - "shared_buffers=128MB"
        deploy:
            resources:
                limits:
                    memory: 256M
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-postgres}",
                ]
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 10s

    redis:
        image: redis:7-alpine
        container_name: booking_redis
        restart: unless-stopped
        command: redis-server --appendonly yes --maxmemory 64mb --maxmemory-policy allkeys-lru
        volumes:
            - redis_data:/data
        deploy:
            resources:
                limits:
                    memory: 128M
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            interval: 5s
            timeout: 3s
            retries: 5
            start_period: 10s

    app:
        build: .
        restart: unless-stopped
        user: "${UID:-1000}:${GID:-1000}"
        ports:
            - "8000:8000"
        env_file:
            - .env
        environment:
            - DATABASE_URL=postgresql+asyncpg://db:5432/${DB_NAME}
            - REDIS_URL=redis://redis:6379
            - UV_CACHE_DIR=/tmp/uv_cache
            - UV_PROJECT_ENVIRONMENT=/app/.venv
        depends_on:
            db:
                condition: service_healthy
            redis:
                condition: service_healthy
        deploy:
            resources:
                limits:
                    memory: 256M
        command: sh app/start.sh

    worker:
        build: .
        restart: unless-stopped
        user: "${UID:-1000}:${GID:-1000}"
        container_name: booking_worker
        env_file:
            - .env
        environment:
            - DATABASE_URL=postgresql+asyncpg://db:5432/${DB_NAME}
            - REDIS_URL=redis://redis:6379
            - UV_CACHE_DIR=/tmp/uv_cache
            - UV_PROJECT_ENVIRONMENT=/app/.venv
        depends_on:
            app:
                condition: service_started
            redis:
                condition: service_healthy
        deploy:
            resources:
                limits:
                    memory: 200M
        command: uv run taskiq worker app.tasks:broker app.tasks

volumes:
    postgres_data:
    redis_data:
