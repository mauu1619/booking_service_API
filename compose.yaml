services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_PASSWORD: ${DB_PASS}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
  
  redis:
    image: redis:7-alpine
    container_name: booking_redis
    restart: always
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  app:
    build: .
    user: "${UID:-1000}:${GID:-1000}"
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${DB_USER}:${DB_PASS}@db:5432/${DB_NAME}
      - REDIS_URL=redis://redis:6379
      - UV_CACHE_DIR=/tmp/uv_cache
      - UV_PROJECT_ENVIRONMENT=/app/.venv
    depends_on:
      db: 
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app:z
      - /app/.venv
    command: sh /app/app/start.sh

  worker:
    build: .
    user: "${UID:-1000}:${GID:-1000}"
    container_name: booking_worker
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${DB_USER}:${DB_PASS}@db:5432/${DB_NAME}
      - REDIS_URL=redis://redis:6379
      - UV_CACHE_DIR=/tmp/uv_cache
      - UV_PROJECT_ENVIRONMENT=/app/.venv
    depends_on:
      app:
        condition: service_started
      redis:
        condition: service_healthy
    command: uv run taskiq worker app.tasks:broker app.tasks
    
volumes:
  postgres_data:
  redis_data: